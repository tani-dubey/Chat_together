<form method="POST">
    <h2>Login</h2>

    <input
        type="text"
        name="username"
        placeholder="Username"
        required
    >

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <br><br>
    <button type="submit">
        Login
    </button>

    <br><br>
    <a href="{{ url_for('register') }}" class="btn">
        New User?
    </a>
 
    {% if error %}
        <p>{{ error }}</p>
    {% endif %}
</form>
