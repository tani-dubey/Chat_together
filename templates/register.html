<form method="POST">
    <h2>Register</h2>

    <input
        type="text"
        name="username"
        placeholder="Username"
        required
    >

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <button type="submit">
        Register
    </button>

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}
</form>
